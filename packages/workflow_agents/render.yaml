projects:
- name: agh621-agents-workshop-workflows
  environments:
  - name: production
    databases:
    - name: agh621-workflow-agents-db
      plan: basic-256mb
      region: oregon
      postgresMajorVersion: '18'
    services:
    - type: web
      name: agh621-agents-gateway
      runtime: python
      region: oregon
      plan: starter
      buildCommand: pip install uv && uv sync --frozen --no-dev --package workshop-workflow-agents
      startCommand: uv run python -m workflow_agents.server
      healthCheckPath: /healthz
      envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agh621-workflow-agents-db
          property: connectionString
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_WORKFLOW_SLUG
        sync: false
      - key: NODE_ENV
        value: production
      - key: PYTHON_VERSION
        value: '3.12'
